name: Nightly Dependency Audit

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC daily
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (moderate+)
        id: audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Outdated packages (informational)
        run: pnpm outdated || true

      - name: Open issue on audit failure
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date();
            const day = String(date.getDate()).padStart(2, '0');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const month = months[date.getMonth()];
            const year = date.getFullYear();
            const title = `[Automated] Dependency Audit Failure — ${day} ${month} ${year}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: 'Nightly dependency audit detected vulnerabilities at moderate severity or above. Run `pnpm audit` locally for details.',
              labels: ['security', 'dependencies'],
            });
