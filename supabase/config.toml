# OFS — Supabase Local Configuration
# Run: supabase start

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# JWT expiry: 1 hour
jwt_expiry = 3600
# Disable email confirmation in local development
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
# Disable email confirmation for local dev only
enable_confirmations = false

[auth.sms]
enable_signup = false

[realtime]
enabled = true
